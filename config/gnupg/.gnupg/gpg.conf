###############################################################################
# Default key
###############################################################################

# The default key to sign with. If this option is not used, the default key is
# the first key found in the secret keyring
#default-key 0x<YOUR-KEY-ID>
#trusted-key 0x<YOUR-KEY-ID>

# Default recipient when encrypting
# Always encrypt to yourself at a minimum to allow you to read your outgoing
default-recipient-self
#default-recipient <user-id>


###############################################################################
# Behavior
###############################################################################

# UTF-8 support for compatibility
charset utf-8

# Disable copyright banner
no-greeting

# Disable inclusion of the version string in ASCII armored output
no-emit-version

# Disable comment string in clear text signatures and ASCII armored messages
no-comments

# Display long key IDs
keyid-format 0xlong

# List all keys (or the specified ones) along with their fingerprints
with-fingerprint

# Display key origins and updates
#with-key-origin

# Cross-certify subkeys are present and valid
require-cross-certification

# Enforce memory locking to avoid accidentally swapping GPG memory to disk
require-secmem

# Disable caching of passphrase for symmetrical operations
no-symkey-cache

# Display ASCII armored format instead of binary by default
armor

# Display the calculated validity of user IDs during key listings
list-options show-uid-validity
verify-options show-uid-validity

# Show expired subkeys
#list-options show-unusable-subkeys

# Try to use the GnuPG-Agent. With this option, GnuPG first tries to connect to
# the agent before it asks for a passphrase. Needed to enable smartcard support.
use-agent

# Use a mix of Trust-On-First-Use and Web-Of-Trust
trust-model tofu+pgp

# Verbose output
#verbose


###############################################################################
# Keyserver
###############################################################################

# When using --refresh-keys, if the key in question has a preferred keyserver
# URL, then disable use of that preferred keyserver to refresh the key from
keyserver-options no-honor-keyserver-url

# When searching for a key with --search-keys, include keys that are marked on
# the keyserver as revoked
keyserver-options include-revoked

# Automatically fetch keys from external sources when not on the local keyring
#auto-key-locate wdk,dane,local
#auto-key-retrieve

# URLs
#keyserver hkps://keys.openpgp.org
#keyserver hkps://keys.mailvelope.com
#keyserver hkps://keyserver.ubuntu.com:443
#keyserver hkps://pgpkeys.eu
#keyserver hkps://pgp.circl.lu
#keyserver hkp://zkaan2xfbuxia2wpf7ofnkbz6r5zdbbvxbunvp5g2iebopbfc4iqmbad.onion

# Proxy
#keyserver-options http-proxy=http://127.0.0.1:8118
#keyserver-options http-proxy=socks5-hostname://127.0.0.1:9050


###############################################################################
# Algorithm, ciphers & compression
###############################################################################

# Use common compression options
personal-compress-preferences ZLIB BZIP2 ZIP Uncompressed
#compression-algo none

# List of personal digest preferences. When multiple digests are supported by
# all recipients, choose the strongest one
personal-cipher-preferences AES256 TWOFISH AES192 AES128

# List of personal digest preferences. When multiple ciphers are supported by
# all recipients, choose the strongest one
personal-digest-preferences SHA512 SHA384 SHA256 SHA224

# Message digest algorithm used when signing a key
cert-digest-algo SHA512

# Message digest algorithm used when performing symmetric operations
s2k-digest-algo SHA512

# Message cipher algorithm used when performing symmetric operations
s2k-cipher-algo AES256

# This preference list is used for new keys and becomes the default for
# "setpref" in the edit menu
default-preference-list SHA512 SHA384 SHA256 SHA224 AES256 AES192 AES128 CAST5 ZLIB BZIP2 ZIP Uncompressed

# Explicitly prevent insecure ciphers from being used (paranoid)
#disable-cipher-algo IDEA DES 3DES RC2 RC4 BLOWFISH

# Explicitly mark insecure digest algos as insecure (paranoid)
#weak-digest MD5
#weak-digest SHA1
#weak-digest RIPEMD160
